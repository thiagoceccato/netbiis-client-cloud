<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netbiis · Client Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --mg:#C2004E;
  --bg:#0D1117;--bg2:#161B22;--bg3:#1C2128;--bg4:#21262D;
  --border:#30363D;--border2:#3D444D;
  --text:#E6EDF3;--text2:#8B949E;--text3:#484F58;
  --green:#2EA043;--green-bg:rgba(46,160,67,0.12);--green-border:rgba(46,160,67,0.3);
  --amber:#D29922;--amber-bg:rgba(210,153,34,0.12);--amber-border:rgba(210,153,34,0.3);
  --red:#F85149;--red-bg:rgba(248,81,73,0.12);--red-border:rgba(248,81,73,0.3);
  --indigo:#58A6FF;--indigo-bg:rgba(88,166,255,0.1);--indigo-border:rgba(88,166,255,0.25);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
code{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--bg4);padding:1px 5px;border-radius:4px;color:#79C0FF;border:1px solid var(--border)}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-brand{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
.sb-hex{width:18px;height:18px;background:var(--mg);clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);flex-shrink:0}
.sb-name{font-weight:700;font-size:13px;color:var(--text)}
.sb-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-top:1px}
.sb-sec{padding:16px 12px 5px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3)}
.sb-list{flex:1;overflow-y:auto;padding:4px 6px}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;border-radius:6px;transition:background 0.1s}
.sb-item:hover{background:var(--bg4)}
.sb-item.active{background:rgba(194,0,78,0.15)}
.sb-item.active .sb-name2{color:var(--text)}
.sb-av{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;color:#fff;flex-shrink:0}
.sb-name2{font-size:12.5px;font-weight:500;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sb-dot.ok{background:var(--green)}
.sb-dot.warn{background:var(--amber)}
.sb-dot.blocked{background:var(--red)}
.sb-dot.neutral{background:var(--text3)}
.sb-add{margin:8px;padding:8px;border:1px dashed var(--border2);border-radius:6px;text-align:center;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);transition:all 0.15s}
.sb-add:hover{border-color:var(--mg);color:var(--mg)}
.sb-foot{padding:10px 12px;border-top:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── CLIENT HEADER ── */
.ch{background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.ch-top{display:flex;align-items:center;gap:12px;padding:14px 20px 0}
.ch-av{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.ch-name{font-weight:700;font-size:17px;letter-spacing:-0.02em;color:var(--text);line-height:1.1}
.ch-meta{display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap}
.ch-info{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)}
.nav{display:flex;padding:0 20px;margin-top:6px}
.nav-btn{padding:9px 14px;background:none;border:none;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--text2);border-bottom:2px solid transparent;transition:all 0.15s;margin-bottom:-1px;white-space:nowrap}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:var(--text);border-bottom-color:var(--mg);font-weight:600}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:20px 24px}
.tab{display:none}
.tab.active{display:block}

/* ── NO CLIENT ── */
.no-client{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.no-hex{width:32px;height:32px;background:var(--bg4);clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%)}
.no-txt{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3)}
.empty{padding:32px 0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3)}

/* ── PILLS ── */
.pill{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;white-space:nowrap;border:1px solid transparent}
.pill.ok{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.pill.warn{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.pill.blocked{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.pill.neutral{background:var(--bg4);color:var(--text2);border-color:var(--border)}
.pill.indigo{background:var(--indigo-bg);color:var(--indigo);border-color:var(--indigo-border)}
.pill.mag{background:rgba(194,0,78,0.15);color:var(--mg);border-color:rgba(194,0,78,0.3)}
.led{width:5px;height:5px;border-radius:50%;display:inline-block;flex-shrink:0}
.led.ok{background:var(--green)}
.led.warn{background:var(--amber)}
.led.blocked{background:var(--red)}
.led.neutral{background:var(--text3)}

/* ── SECTION HEADER (sistema) ── */
.sec{margin-top:24px;margin-bottom:10px}
.sec:first-child{margin-top:0}
.sec-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.sec-title{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.01em}
.sec-line{height:1px;background:var(--border);margin-top:8px}

/* ── INFO GRID ── */
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:14px}
.info-card{padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px}
.info-card-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.info-card-val{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}

/* ── DESC ── */
.desc{padding:13px 15px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:14px}

/* ── PEOPLE ── */
.people{display:flex;flex-wrap:wrap;gap:6px}
.person{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;min-width:180px}
.p-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;color:#fff;flex-shrink:0}
.p-name{font-weight:600;font-size:12.5px;color:var(--text);line-height:1.2}
.p-role{font-size:11px;color:var(--text3);margin-top:1px}
.p-badge{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:2px 6px;border-radius:3px;flex-shrink:0}
.p-badge.c{background:rgba(222,72,38,0.12);color:#DE4826}
.p-badge.n{background:rgba(194,0,78,0.1);color:var(--mg)}

/* ── STACK ── */
.stack-row{display:flex;flex-wrap:wrap;gap:6px}
.stag{padding:5px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;font-size:12.5px;font-weight:500;color:var(--text)}
.stag span{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);margin-left:5px}

/* ── PROJECT CARD ── */
.proj{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden}
.proj-hd{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;cursor:pointer;border-left:3px solid var(--mg);transition:background 0.1s}
.proj-hd:hover{background:var(--bg3)}
.proj-hd-left{flex:1}
.proj-hd-name{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-0.01em;margin-bottom:6px}
.proj-hd-pills{display:flex;gap:5px;flex-wrap:wrap}
.proj-toggle{color:var(--text3);font-size:13px;transition:transform 0.15s;padding-top:2px;flex-shrink:0}
.proj-toggle.open{transform:rotate(90deg)}
.proj-body{display:none;border-top:1px solid var(--border)}
.proj-body.open{display:block}

/* ── PROJ SECTIONS ── */
.ps{padding:16px;border-bottom:1px solid var(--border)}
.ps:last-child{border-bottom:none}
.ps-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.proj-desc{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:12px}
.proj-escopo{font-size:12px;color:var(--text3);margin-bottom:12px}

/* ── DELIVERABLES ── */
.deliv-list{list-style:none;padding:0}
.deliv-list li{display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:12.5px;color:var(--text2);border-bottom:1px solid var(--border)}
.deliv-list li:last-child{border-bottom:none}
.deliv-bullet{color:var(--mg);font-weight:700;flex-shrink:0;font-size:11px;margin-top:2px}

/* ── DATA TABLE ── */
.dtable{width:100%;border-collapse:collapse;background:var(--bg3);border:1px solid var(--border);border-radius:6px;overflow:hidden;font-size:12px}
.dtable th{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;text-align:left;padding:8px 12px;background:var(--bg4);color:var(--text3);border-bottom:1px solid var(--border)}
.dtable td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
.dtable tr:last-child td{border-bottom:none}
.dtable td:first-child{font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:600;color:var(--text)}
.dtable tr:hover td{background:var(--bg4)}

/* ── JOURNEY ACCORDION ── */
.journey{background:var(--bg3);border:1px solid var(--border);border-radius:6px;margin-bottom:5px;overflow:hidden}
.jh{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;transition:background 0.1s}
.jh:hover{background:var(--bg4)}
.jh-name{font-weight:600;font-size:13px;color:var(--text);flex:1;letter-spacing:-0.01em}
.jh-emails{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3)}
.jh-toggle{color:var(--text3);font-size:11px;transition:transform 0.15s;flex-shrink:0}
.jh-toggle.open{transform:rotate(90deg)}
.jb{display:none;border-top:1px solid var(--border);padding:14px}
.jb.open{display:block}
.jb-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:7px;margin-top:14px}
.jb-label:first-child{margin-top:0}

/* ── FIELD TAGS ── */
.fields{display:flex;flex-wrap:wrap;gap:4px}
.ftag{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 7px;background:var(--bg4);border:1px solid var(--border);border-radius:4px;color:var(--text2)}

/* ── MISSING LIST ── */
.miss-list{list-style:none;padding:0}
.miss-list li{display:flex;align-items:flex-start;gap:7px;padding:4px 0;font-size:12.5px;color:var(--text2);border-bottom:1px solid var(--border)}
.miss-list li:last-child{border-bottom:none}
.miss-dot{width:6px;height:6px;border-radius:50%;background:var(--amber);flex-shrink:0;margin-top:5px}

/* ── OBS ── */
.obs{margin-top:10px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:5px;font-size:12px;color:var(--text3);line-height:1.55;font-style:italic}

/* ── ISSUE ── */
.issue{padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:5px;margin-bottom:5px;border-left:2px solid var(--red)}
.issue.warn{border-left-color:var(--amber)}
.issue.info{border-left-color:var(--indigo)}
.issue-id{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);margin-bottom:3px}
.issue-title{font-size:12.5px;font-weight:500;color:var(--text);margin-bottom:6px}
.issue-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.issue-by{font-size:11px;color:var(--text3)}

/* ── DOC LIST ── */
.doc-list{display:flex;flex-direction:column;gap:4px}
.doc-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;text-decoration:none;cursor:pointer;transition:border-color 0.15s}
.doc-row:hover{border-color:var(--mg)}
.doc-icon{width:28px;height:28px;border-radius:5px;background:var(--bg4);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;color:var(--text3);flex-shrink:0}
.doc-name{font-size:12.5px;font-weight:500;color:var(--text);flex:1}
.doc-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)}

/* ── AGENDA ── */
.ag-list{display:flex;flex-direction:column;gap:4px}
.ag-row{display:flex;align-items:flex-start;gap:12px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px}
.ag-date{text-align:center;min-width:38px;padding:5px 6px;background:var(--bg4);border-radius:5px;border:1px solid var(--border);flex-shrink:0}
.ag-day{font-weight:700;font-size:16px;color:var(--text);line-height:1}
.ag-month{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-top:1px}
.ag-title{font-weight:600;font-size:12.5px;color:var(--text);margin-bottom:2px}
.ag-parts{font-size:11.5px;color:var(--text3)}

/* ── TRANS ── */
.trans-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tc-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:8px}
.tr-row{padding:9px 11px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;margin-bottom:5px}
.tr-title{font-weight:600;font-size:12.5px;color:var(--text);margin-bottom:2px}
.tr-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)}
.tr-sum{font-size:12px;color:var(--text2);margin-top:5px;line-height:1.5}
.tr-link{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--indigo);display:block;margin-top:5px;text-decoration:none}

/* ── DBG ── */
#dbg{position:fixed;bottom:0;left:0;right:0;background:#0A0A0B;color:#a3e635;font-family:monospace;font-size:11px;padding:8px 14px;max-height:140px;overflow-y:auto;z-index:9999;border-top:2px solid var(--mg);display:none}
#dbg.show{display:block}
#dbg-btn{position:fixed;bottom:0;right:0;background:var(--mg);color:#fff;font-family:monospace;font-size:10px;padding:3px 10px;cursor:pointer;z-index:10000;border:none}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="sb-hex"></div>
      <div><div class="sb-name">Netbiis</div><div class="sb-sub">Client Cloud</div></div>
    </div>
    <div class="sb-sec">Clientes</div>
    <div class="sb-list" id="clist"><div style="padding:10px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)">Carregando...</div></div>
    <div class="sb-add" onclick="alert('Em breve')">+ Novo cliente</div>
    <div class="sb-foot">Netbiis Client Cloud · v0.2</div>
  </aside>

  <div class="main" id="main">
    <div class="no-client"><div class="no-hex"></div><div class="no-txt">Selecione um cliente</div></div>
  </div>
</div>

<button id="dbg-btn" onclick="document.getElementById('dbg').classList.toggle('show')">DBG</button>
<div id="dbg"></div>

<script>
const PUB='2PACX-1vSWBnP21S5C86OZYYCOqijT_mXtq8XNdpNBQG2mnzhL9FOgirDfaQ5nXDqPTYCzJvCFNWflSGF_d7tg';
const GIDS={
  clientes:'1343344067',stakeholders:'1958512368',stack:'1791147887',
  projetos:'693403923',jornadas:'1551819716',fontes_dados:'1267510316',
  issues:'1581403890',documentos:'1019560512',agendas:'418089559',transcricoes:'1097052222'
};
let D={},AC=null,AT='overview';

function dbg(m,e=false){
  const el=document.getElementById('dbg');
  const d=document.createElement('div');
  d.style.color=e?'#f85149':'#a3e635';
  d.textContent=`[${new Date().toLocaleTimeString()}] ${m}`;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}

async function fetchSheet(name){
  const url=`https://docs.google.com/spreadsheets/d/e/${PUB}/pub?output=csv&gid=${GIDS[name]}&single=true`;
  dbg(`fetch ${name}`);
  const r=await fetch(url,{cache:'no-cache'});
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  const t=await r.text();
  dbg(`${name} → ${t.length}c`);
  return parseCSV(t);
}

function parseCSV(text){
  // normalize line endings
  const raw=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const lines=[];
  let cur='',inQ=false;
  for(let i=0;i<raw.length;i++){
    const c=raw[i];
    if(c==='"'){
      if(inQ&&raw[i+1]==='"'){cur+='"';i++;}
      else inQ=!inQ;
    } else if(c==='\n'&&!inQ){
      lines.push(cur);cur='';
    } else {
      cur+=c;
    }
  }
  if(cur)lines.push(cur);
  if(lines.length<2)return[];
  const headers=splitLine(lines[0]);
  return lines.slice(1).map(l=>{
    const vals=splitLine(l);
    const obj={};
    headers.forEach((h,i)=>obj[h.trim()]=(vals[i]||'').trim());
    return obj;
  }).filter(r=>Object.values(r).some(v=>v));
}

function splitLine(line){
  const out=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){out.push(cur);cur='';}
    else cur+=c;
  }
  out.push(cur);
  return out;
}

// split multiline field — handles \n literal, actual newlines, and · separator
function splitField(s,sep){
  if(!s||s.includes('[preencher'))return[];
  if(sep==='line'){
    // try real newlines first, then \n literal
    const parts=s.includes('\n')?s.split('\n'):s.split('\\n');
    return parts.map(p=>p.replace(/^\d+\.\s*/,'').trim()).filter(Boolean);
  }
  // dot separator
  return s.split(/[·\|]/).map(p=>p.trim()).filter(Boolean);
}

async function loadAll(){
  dbg('iniciando...');
  for(const k of Object.keys(GIDS)){
    try{D[k]=await fetchSheet(k);}
    catch(e){dbg(`ERRO ${k}: ${e.message}`,true);D[k]=[];}
  }
  dbg(`clientes: ${(D.clientes||[]).length}`);
  if(D.clientes?.length)dbg(`first: ${JSON.stringify(D.clientes[0]).slice(0,120)}`);
  if(D.jornadas?.length)dbg(`jornada[0]: ${JSON.stringify(D.jornadas[0]).slice(0,200)}`);
  renderSidebar();
  if(D.clientes?.length)select(D.clientes[0].id);
}

function ini(n){if(!n)return'?';return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()}
function sc(s){
  if(!s)return'neutral';const v=s.toLowerCase();
  if(v.includes('andamento')||v.includes('ok')||v.includes('ativo')||v.includes('rodando'))return'ok';
  if(v.includes('risco')||v.includes('aten')||v.includes('parcial')||v.includes('vazia')||v.includes('mapear'))return'warn';
  if(v.includes('bloq')||v.includes('criti')||v.includes('não existe'))return'blocked';
  return'neutral';
}
function ic(s){if(!s)return'';const v=s.toLowerCase();if(v.includes('criti'))return'';if(v.includes('aten'))return'warn';return'info';}
const MO=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

function renderSidebar(){
  const el=document.getElementById('clist');
  if(!D.clientes?.length){el.innerHTML='<div style="padding:10px;font-family:\'JetBrains Mono\',monospace;font-size:10px;color:var(--text3)">Nenhum cliente</div>';return;}
  el.innerHTML=D.clientes.map(c=>`
    <div class="sb-item ${AC===c.id?'active':''}" onclick="select('${c.id}')">
      <div class="sb-av" style="background:${c.cor||'#444'}">${ini(c.nome)}</div>
      <span class="sb-name2">${c.nome}</span>
      <span class="sb-dot ${sc(c.status_geral)}"></span>
    </div>`).join('');
}

function select(id){AC=id;AT='overview';renderSidebar();renderMain();}

function switchTab(id){
  AT=id;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
  document.querySelectorAll('.tab').forEach(p=>p.classList.toggle('active',p.id==='t-'+id));
}

function renderMain(){
  const c=D.clientes.find(x=>x.id===AC);
  if(!c)return;
  const col=c.cor||'#555';
  const sh=(D.stakeholders||[]).filter(x=>x.cliente_id===AC);
  const stk=(D.stack||[]).filter(x=>x.cliente_id===AC);
  const proj=(D.projetos||[]).filter(x=>x.cliente_id===AC);
  const ag=(D.agendas||[]).filter(x=>x.cliente_id===AC);
  const tr=(D.transcricoes||[]).filter(x=>x.cliente_id===AC);
  const TABS=[
    {id:'overview',label:'Visão Geral'},
    {id:'projects',label:`Projetos${proj.length?` (${proj.length})`:''}`},
    {id:'docs',label:'Documentos'},
    {id:'agenda',label:'Agendas'},
    {id:'trans',label:'Transcrições'},
  ];
  document.getElementById('main').innerHTML=`
    <div class="ch">
      <div class="ch-top">
        <div class="ch-av" style="background:${col}">${ini(c.nome)}</div>
        <div style="flex:1">
          <div class="ch-name">${c.nome}</div>
          <div class="ch-meta">
            ${c.cidade||c.pais?`<span class="ch-info">${[c.cidade,c.pais].filter(Boolean).join(', ')}</span>`:''}
            <span class="ch-info">${c.mercado||''}</span>
            <span class="pill ${sc(c.status_geral)}"><span class="led ${sc(c.status_geral)}"></span>${c.status_geral||'—'}</span>
          </div>
        </div>
      </div>
      <nav class="nav">
        ${TABS.map(t=>`<button class="nav-btn ${AT===t.id?'active':''}" data-tab="${t.id}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('')}
      </nav>
    </div>
    <div class="content">
      <div class="tab ${AT==='overview'?'active':''}" id="t-overview">${renderOverview(c,sh,stk)}</div>
      <div class="tab ${AT==='projects'?'active':''}" id="t-projects">${renderProjects(proj)}</div>
      <div class="tab ${AT==='docs'?'active':''}" id="t-docs">${renderDocs(proj)}</div>
      <div class="tab ${AT==='agenda'?'active':''}" id="t-agenda">${renderAgenda(ag)}</div>
      <div class="tab ${AT==='trans'?'active':''}" id="t-trans">${renderTrans(tr)}</div>
    </div>`;
}

function renderOverview(c,sh,stk){
  const cli=sh.filter(s=>s.tipo==='cliente');
  const nb=sh.filter(s=>s.tipo==='netbiis');
  return `
    <div class="sec"><div class="sec-label">Informações do cliente</div><div class="sec-line"></div></div>
    <div class="info-grid">
      ${c.mercado?`<div class="info-card"><div class="info-card-label">Mercado</div><div class="info-card-val">${c.mercado}</div></div>`:''}
      ${c.segmento?`<div class="info-card"><div class="info-card-label">Segmento</div><div class="info-card-val">${c.segmento}</div></div>`:''}
      ${c.pais?`<div class="info-card"><div class="info-card-label">Localização</div><div class="info-card-val">${[c.cidade,c.pais].filter(Boolean).join(', ')}</div></div>`:''}
      <div class="info-card"><div class="info-card-label">Status</div><div class="info-card-val"><span class="pill ${sc(c.status_geral)}">${c.status_geral||'—'}</span></div></div>
    </div>
    ${c.descricao?`<div class="desc">${c.descricao}</div>`:''}
    ${stk.length?`
    <div class="sec"><div class="sec-label">Stack de Tecnologia</div><div class="sec-line"></div></div>
    <div class="stack-row">${stk.map(s=>`<div class="stag">${s.tecnologia}<span>${s.categoria||''}</span></div>`).join('')}</div>`:''}
    ${cli.length?`
    <div class="sec" style="margin-top:20px"><div class="sec-label">Stakeholders do Cliente</div><div class="sec-line"></div></div>
    <div class="people">${cli.map(s=>`<div class="person"><div class="p-av" style="background:#DE4826">${ini(s.nome)}</div><div><div class="p-name">${s.nome}</div><div class="p-role">${s.cargo||''}</div></div><div class="p-badge c">Cliente</div></div>`).join('')}</div>`:''}
    ${nb.length?`
    <div class="sec" style="margin-top:16px"><div class="sec-label">Time Netbiis</div><div class="sec-line"></div></div>
    <div class="people">${nb.map(s=>`<div class="person"><div class="p-av" style="background:rgba(194,0,78,0.2);color:var(--mg)">${ini(s.nome)}</div><div><div class="p-name">${s.nome}</div><div class="p-role">${s.cargo||''}</div></div><div class="p-badge n">Netbiis</div></div>`).join('')}</div>`:''}
  `;
}

function renderProjects(proj){
  if(!proj.length)return'<div class="empty">Nenhum projeto cadastrado</div>';
  return proj.map((p,i)=>{
    const fontes=(D.fontes_dados||[]).filter(f=>f.projeto_id===p.id);
    const jornadas=(D.jornadas||[]).filter(j=>j.projeto_id===p.id);
    const allIss=(D.issues||[]).filter(x=>x.projeto_id===p.id);
    const globalIss=allIss.filter(x=>!x.jornada_id||x.jornada_id.trim()==='');
    const abertos=allIss.filter(x=>(x.status||'').toLowerCase().includes('aberto'));
    const delivs=splitField(p.deliverables,'line');
    const s=sc(p.status);
    return `
      <div class="proj">
        <div class="proj-hd" onclick="tgProj('pb${i}','pt${i}')">
          <div class="proj-hd-left">
            <div class="proj-hd-name">${p.nome}</div>
            <div class="proj-hd-pills">
              <span class="pill ${s}"><span class="led ${s}"></span>${p.status||'—'}</span>
              ${jornadas.length?`<span class="pill neutral">${jornadas.length} jornadas</span>`:''}
              ${fontes.length?`<span class="pill neutral">${fontes.length} fontes de dados</span>`:''}
              ${abertos.length?`<span class="pill blocked">${abertos.length} issues abertos</span>`:''}
            </div>
          </div>
          <span class="proj-toggle" id="pt${i}">›</span>
        </div>
        <div class="proj-body" id="pb${i}">

          <div class="ps">
            ${p.descricao?`<div class="proj-desc">${p.descricao}</div>`:''}
            ${p.escopo?`<div class="proj-escopo">${p.escopo}</div>`:''}
            ${delivs.length?`
              <div class="ps-label" style="margin-top:${p.descricao?'12px':'0'}">Deliverables</div>
              <ul class="deliv-list">${delivs.map(d=>`<li><span class="deliv-bullet">›</span>${d}</li>`).join('')}</ul>`:''}
          </div>

          ${fontes.length?`
          <div class="ps">
            <div class="ps-label">Fontes de Dados</div>
            <table class="dtable">
              <thead><tr><th>Fonte</th><th>Camada</th><th>Status</th><th>Emails impactados</th><th>Responsável</th></tr></thead>
              <tbody>${fontes.map(f=>`<tr>
                <td><code>${f.nome}</code></td>
                <td><span class="pill ${f.camada==='L2'?'mag':f.camada==='L1'?'warn':'neutral'}">${f.camada}</span></td>
                <td><span class="pill ${sc(f.status)}">${f.status}</span></td>
                <td style="color:var(--text3);font-size:11.5px">${f.emails_impactados||'—'}</td>
                <td style="color:var(--text3);font-size:11.5px">${f.responsavel&&!f.responsavel.includes('preen')?f.responsavel:'—'}</td>
              </tr>`).join('')}</tbody>
            </table>
          </div>`:''}

          ${jornadas.length?`
          <div class="ps">
            <div class="ps-label">Jornadas</div>
            ${jornadas.map((j,ji)=>{
              const jIss=allIss.filter(x=>x.jornada_id&&x.jornada_id.split(',').map(s=>s.trim()).includes(j.id));
              const campos=j.campos_necessarios?j.campos_necessarios.split(',').map(s=>s.trim()).filter(Boolean):[];
              const falta=splitField(j.o_que_falta,'dot');
              const js=sc(j.status);
              return `<div class="journey">
                <div class="jh" onclick="tgJ('jb${i}_${ji}','jt${i}_${ji}')">
                  <span class="pill ${js}" style="flex-shrink:0"><span class="led ${js}"></span>${j.status||'—'}</span>
                  <span class="jh-name">${j.nome}</span>
                  ${j.emails&&!j.emails.includes('preencher')?`<span class="jh-emails">${j.emails} emails</span>`:''}
                  ${jIss.length?`<span class="pill blocked" style="margin-left:4px">${jIss.length} issue${jIss.length>1?'s':''}</span>`:''}
                  <span class="jh-toggle" id="jt${i}_${ji}">›</span>
                </div>
                <div class="jb" id="jb${i}_${ji}">
                  ${campos.length?`
                    <div class="jb-label">Campos necessários</div>
                    <div class="fields">${campos.map(f=>`<span class="ftag">${f}</span>`).join('')}</div>`:''}
                  ${falta.length?`
                    <div class="jb-label">O que falta para ativar</div>
                    <ul class="miss-list">${falta.map(f=>`<li><span class="miss-dot"></span>${f}</li>`).join('')}</ul>`:''}
                  ${j.observacao&&!j.observacao.includes('preencher')?`<div class="obs">${j.observacao}</div>`:''}
                  ${jIss.length?`
                    <div class="jb-label" style="margin-top:12px">Issues desta jornada</div>
                    ${jIss.map(iss=>`<div class="issue ${ic(iss.severidade)}">
                      <div class="issue-id">${iss.id}</div>
                      <div class="issue-title">${iss.titulo}</div>
                      <div class="issue-meta">
                        <span class="pill ${sc(iss.severidade)}">${iss.severidade||'—'}</span>
                        <span class="pill neutral">${iss.status||'—'}</span>
                        <span class="issue-by">${iss.descoberto_por||''} · ${iss.data||''}</span>
                      </div>
                    </div>`).join('')}`:''}
                </div>
              </div>`;
            }).join('')}
          </div>`:''}

          ${globalIss.length?`
          <div class="ps">
            <div class="ps-label">Issues do Projeto</div>
            ${globalIss.map(iss=>`<div class="issue ${ic(iss.severidade)}">
              <div class="issue-id">${iss.id}</div>
              <div class="issue-title">${iss.titulo}</div>
              <div class="issue-meta">
                <span class="pill ${sc(iss.severidade)}">${iss.severidade||'—'}</span>
                <span class="pill neutral">${iss.status||'—'}</span>
                <span class="issue-by">${iss.descoberto_por||''} · ${iss.data||''}</span>
              </div>
            </div>`).join('')}
          </div>`:''}

        </div>
      </div>`;
  }).join('');
}

function tgProj(b,t){const el=document.getElementById(b),tg=document.getElementById(t);if(el){el.classList.toggle('open');if(tg)tg.classList.toggle('open');}}
function tgJ(b,t){const el=document.getElementById(b),tg=document.getElementById(t);if(el){el.classList.toggle('open');if(tg)tg.classList.toggle('open');}}

function renderDocs(proj){
  const ids=proj.map(p=>p.id);
  const docs=(D.documentos||[]).filter(d=>ids.includes(d.projeto_id));
  if(!docs.length)return'<div class="empty">Nenhum documento cadastrado</div>';
  const byP={};
  docs.forEach(d=>{if(!byP[d.projeto_id])byP[d.projeto_id]=[];byP[d.projeto_id].push(d);});
  return Object.entries(byP).map(([pid,pd])=>{
    const p=proj.find(x=>x.id===pid);
    return `
      <div class="sec"><div class="sec-label">${p?p.nome:pid}</div><div class="sec-line"></div></div>
      <div class="doc-list">${pd.map(d=>`
        <a class="doc-row" href="${d.url&&!d.url.includes('preencher')?d.url:'#'}" target="${d.url&&!d.url.includes('preencher')?'_blank':'_self'}">
          <div class="doc-icon">${(d.tipo||'DOC').substring(0,3).toUpperCase()}</div>
          <div class="doc-name">${d.nome}</div>
          <span class="pill neutral">${d.tipo||'—'}</span>
          <div class="doc-date">${d.data||''}</div>
        </a>`).join('')}</div>`;
  }).join('');
}

function renderAgenda(ag){
  if(!ag.length)return'<div class="empty">Nenhuma agenda cadastrada</div>';
  return `<div class="ag-list">${ag.map(a=>{
    const p=(a.data||'').split('-');
    return `<div class="ag-row">
      <div class="ag-date"><div class="ag-day">${p[2]||'—'}</div><div class="ag-month">${p[1]?MO[parseInt(p[1])-1]:''}</div></div>
      <div style="flex:1"><div class="ag-title">${a.titulo||'—'}</div><div class="ag-parts">${a.participantes||''}</div></div>
      <span class="pill neutral">${a.tipo||'—'}</span>
      ${a.link&&!a.link.includes('preencher')?`<a href="${a.link}" target="_blank" style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--indigo);text-decoration:none">↗</a>`:''}
    </div>`;
  }).join('')}</div>`;
}

function renderTrans(tr){
  if(!tr.length)return'<div class="empty">Nenhuma transcrição cadastrada</div>';
  const cli=tr.filter(t=>t.tipo==='cliente');
  const int=tr.filter(t=>t.tipo!=='cliente');
  const col=(items,label)=>`<div>
    <div class="tc-label">${label} (${items.length})</div>
    ${items.length?items.map(t=>`<div class="tr-row">
      <div class="tr-title">${t.titulo||'—'}</div>
      <div class="tr-meta">${t.data||''} · ${t.participantes||''}</div>
      ${t.resumo?`<div class="tr-sum">${t.resumo}</div>`:''}
      ${t.url&&!t.url.includes('preencher')?`<a href="${t.url}" target="_blank" class="tr-link">↗ Abrir</a>`:''}
    </div>`).join(''):'<div class="empty" style="padding:16px 0">Nenhuma</div>'}
  </div>`;
  return `<div class="trans-cols">${col(cli,'Interações com o cliente')}${col(int,'Discussões internas')}</div>`;
}

loadAll();
</script>
</body>
